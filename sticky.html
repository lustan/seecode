<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Note</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <style>
      html, body {
        width: 100%;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: "JetBrains Mono", "Consolas", "Monaco", monospace;
        background: #2b2b2b;
        color: #a9b7c6;
      }
      
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: #2b2b2b;
      }

      /* 便签专用样式 */
      .sticky-window {
        display: flex;
        flex-direction: column;
        height: 100%;
        border: 2px solid #515658;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        background: #2b2b2b;
      }

      .sticky-header {
        background: linear-gradient(135deg, #3c3f41 0%, #444749 100%);
        padding: 10px 14px;
        border-bottom: 1px solid #515658;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 36px;
        cursor: move; /* 恢复拖拽提示 */
        flex-shrink: 0;
        border-radius: 10px 10px 0 0;
      }

      .sticky-title {
        font-size: 13px;
        color: #a9b7c6;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        margin-right: 8px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }

      .sticky-close {
        width: 24px;
        height: 24px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: #a9b7c6;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.2s ease;
        backdrop-filter: blur(4px);
      }

      .sticky-close:hover {
        background: rgba(255, 68, 68, 0.8);
        color: #fff;
        transform: scale(1.1);
      }

      .sticky-content {
        flex: 1;
        padding: 12px;
        background: #2b2b2b;
        overflow: hidden;
        min-height: 0;
        border-radius: 0 0 10px 10px;
      }

      /* IDEA 样式滚动条 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #2b2b2b;
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb {
        background: #515658;
        border-radius: 0;
        border: 1px solid #2b2b2b;
        transition: background 0.2s ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #626466;
      }
      ::-webkit-scrollbar-corner {
        background: #2b2b2b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/sticky.tsx"></script>
  </body>
</html>
