<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seecode</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <style>
      html, body {
        width: 100% !important;
        height: 100vh !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important; /* 强制确保外层不滚动 */
        font-family: "JetBrains Mono", "Consolas", "Monaco", monospace;
        background: #2b2b2b; /* IDEA 深色背景 */
        color: #a9b7c6; /* IDEA 文字色 */
        /* 移除固定定位，改为相对定位 */
        position: relative;
        max-width: 100vw !important;
        max-height: 100vh !important;
      }
      #root {
        width: 100vw !important;
        height: 100vh !important;
        display: flex;
        flex-direction: column;
        background: #2b2b2b; /* IDEA 深色背景 */
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important; /* 强制确保根容器不滚动 */
        /* 移除固定定位 */
        position: relative;
        max-width: 100vw !important;
        max-height: 100vh !important;
      }
      
      /* IDEA 样式滚动条 */
      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #2b2b2b;
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb {
        background: #515658;
        border-radius: 0;
        border: 2px solid #2b2b2b;
        transition: background 0.2s ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #626466;
      }
      ::-webkit-scrollbar-corner {
        background: #2b2b2b;
      }
      
      /* IDEA 样式加载动画 */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #2b2b2b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      
      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #515658;
        border-top: 2px solid #4a90e2; /* IDEA 蓝色 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* IDEA 样式选择文本 */
      ::selection {
        background: #214283; /* IDEA 选中背景 */
        color: #a9b7c6;
      }
      
      ::-moz-selection {
        background: #214283; /* IDEA 选中背景 */
        color: #a9b7c6;
      }
      
      /* IDEA 样式输入框 */
      input, textarea {
        background: #2b2b2b;
        color: #a9b7c6;
        border: 1px solid #515658;
      }
      
      input:focus, textarea:focus {
        border-color: #4a90e2;
        outline: none;
      }
      
      /* IDEA 样式按钮 */
      button {
        background: #3c3f41;
        color: #a9b7c6;
        border: 1px solid #515658;
        font-family: inherit;
      }
      
      button:hover {
        background: #515658;
      }
      
      button:focus {
        outline: none;
        border-color: #4a90e2;
      }
      
      /* 强制隐藏所有滚动条 */
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none !important;
        width: 0px !important;
        height: 0px !important;
      }
      
      html, body {
        scrollbar-width: none !important; /* Firefox */
        -ms-overflow-style: none !important; /* Internet Explorer 10+ */
      }
    </style>
  </head>
  <body>
    <!-- IDEA 样式加载动画 -->
    <div class="loading-overlay" id="loading">
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <!-- 强制禁用页面滚动的脚本 -->
    <script>
      // 强制禁用页面滚动
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      
      // 禁用滚动事件
      window.addEventListener('scroll', function(e) {
        e.preventDefault();
        window.scrollTo(0, 0);
      }, { passive: false });
      
      // 禁用键盘滚动
      window.addEventListener('keydown', function(e) {
        if([32, 33, 34, 35, 36, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
          if (e.target === document.body) {
            e.preventDefault();
          }
        }
      }, false);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
    <script type="module" src="/src/editor-loader.js"></script>
  </body>
</html>
