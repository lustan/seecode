<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seecode</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <style>
      html, body {
        width: 600px;
        height: 598px; /* Chrome extension popup 最大高度限制约600px */
        min-width: 600px;
        max-width: 600px;
        min-height: 598px; /* 确保最小高度也是598px */
        max-height: 598px; /* 确保最大高度不超过Chrome限制 */
        margin: 0;
        padding: 0;
        overflow: hidden;
        box-sizing: border-box;
        font-family: "JetBrains Mono", "Consolas", "Monaco", "Courier New", monospace;
        background: #2b2b2b;
        color: #a9b7c6;
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: linear-gradient(135deg, #2b2b2b 0%, #1e1e1e 100%);
      }
      
      /* IDEA风格滚动条 */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #3c3f41;
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb {
        background: #6c6c6c;
        border-radius: 0;
        border: 1px solid #3c3f41;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8c8c8c;
      }
      ::-webkit-scrollbar-corner {
        background: #3c3f41;
      }
      
      /* IDEA 样式选择文本 */
      ::selection {
        background: #214283; /* IDEA 选中背景 */
        color: #a9b7c6;
      }
      
      ::-moz-selection {
        background: #214283; /* IDEA 选中背景 */
        color: #a9b7c6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/popup.tsx"></script>
  </body>
</html>
